name: Deploy Beta

on:
  workflow_dispatch:

concurrency:
  group: deploy-beta
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Beta
    runs-on: ubuntu-latest
    if: github.actor == 'jholbert-ri' || github.actor == 'jholbert1'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.BETA_SSH_HOST }}
          username: ${{ secrets.BETA_SSH_USER }}
          password: ${{ secrets.BETA_SSH_PASSWORD }}
          port: ${{ secrets.BETA_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd /orgs/g-pulse/G-Pulse-api
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            docker rm -f g-pulse-api || true
            docker build -t g-pulse-api .
            docker run -d \
              --name g-pulse-api \
              --restart unless-stopped \
              --env-file ./.env \
              -p 127.0.0.1:9000:9000 \
              g-pulse-api
            sleep 5
            docker exec g-pulse-api npx prisma migrate deploy
