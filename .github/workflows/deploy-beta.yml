name: Deploy Beta

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-beta
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Beta
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.BETA_SSH_HOST }}
          username: ${{ secrets.BETA_SSH_USER }}
          password: ${{ secrets.BETA_SSH_PASSWORD }}
          port: ${{ secrets.BETA_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd /orgs/g-pulse/G-Pulse-api
            git pull origin master
            docker rm -f g-pulse-api || true
            docker build -t g-pulse-api .
            docker run -d \
              --name g-pulse-api \
              --restart unless-stopped \
              --env-file ./.env \
              -p 127.0.0.1:9000:9000 \
              g-pulse-api
